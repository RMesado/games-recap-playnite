name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore GamesRecapPlugin/GamesRecap/GamesRecap.sln

      - name: Patch extension.yaml version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $yaml = "GamesRecapPlugin/GamesRecap/extension.yaml"
          (Get-Content $yaml) -replace '^Version: .+', "Version: $version" | Set-Content $yaml

      - name: Build
        run: msbuild GamesRecapPlugin/GamesRecap/GamesRecap.csproj /t:Build /p:Configuration=Release /p:Platform=AnyCPU

      - name: Package .pext
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $src = "GamesRecapPlugin/GamesRecap/bin/Release"
          $pext = "GamesRecap_$version.pext"
          $staging = "pext_staging"
          if (Test-Path $staging) { Remove-Item $staging -Recurse -Force }
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "$src/GamesRecap.dll" $staging
          Copy-Item "$src/extension.yaml" $staging
          Copy-Item "$src/icon.png" $staging
          Copy-Item "$src/icon-calendar.png" $staging
          Copy-Item "$src/System.Data.SQLite.dll" $staging
          Copy-Item "$src/x86" "$staging/x86" -Recurse
          Copy-Item "$src/x64" "$staging/x64" -Recurse
          if (Test-Path "$src/GamesRecap.pdb") { Copy-Item "$src/GamesRecap.pdb" $staging }
          if (Test-Path "$src/Localization") { Copy-Item "$src/Localization" $staging -Recurse }
          Compress-Archive -Path "$staging/*" -DestinationPath $pext
          Remove-Item $staging -Recurse -Force
          "pext_path=$pext" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.pext_path }}
          generate_release_notes: true
