name: Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    if: contains(github.event.head_commit.message, 'Merge')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          latest=$(git tag --list "v*" --sort=-version:refname | head -n1)

          if [ -z "$latest" ]; then
            next="v1.0.0"
          else
            version=${latest#v}
            IFS='.' read major minor patch <<< "$version"

            patch=$((patch + 1))

            next="v$major.$minor.$patch"
          fi

          echo "next=$next"
          echo "next=$next" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "bot-releaseador"

          git tag ${{ steps.tag.outputs.next }}
          git push origin ${{ steps.tag.outputs.next }}